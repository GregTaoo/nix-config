general {
    hide_cursor = true
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    # 路径请务必使用绝对路径
    path = /home/gregtao/.config/hypr/assets/wallpaper.png
    
    # 核心亚克力效果配置
    blur_passes = 2           # 模糊次数，越高越像毛玻璃
    blur_size = 5             # 模糊半径
    noise = 0.0117            # 微量噪点，模拟材质感
    contrast = 0.8916         # 对比度
    brightness = 0.5          # 降低亮度，营造暗色调
    vibrancy = 0.1696         # 色彩饱和度
    vibrancy_darkness = 0.1   # 暗部增强
}

# 时间显示 (大字，半透明白色)
label {
    monitor =
    text = $TIME
    color = rgba(255, 255, 255, 0.7)
    font_size = 90
    font_family = JetBrains Mono Nerd Font ExtraBold
    position = 0, 160
    halign = center
    valign = center
}

# 日期显示
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%y/%m/%d %A")"
    color = rgba(255, 255, 255, 0.6)
    font_size = 20
    font_family = JetBrains Mono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}

# 密码输入框 (深色半透明容器)
input-field {
    monitor =
    size = 380, 60
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.35
    dots_center = true
    
    # 边框颜色 (深灰色带透明)
    outer_color = rgba(0, 0, 0, 0)
    # 输入框背景 (暗色亚克力核心：深色且高透明)
    inner_color = rgba(0, 0, 0, 0.4)
    # 字体颜色
    font_color = rgb(200, 200, 200)
    
    fade_on_empty = false
    rounding = 15 # 圆角
    
    # 状态颜色
    check_color = rgba(204, 136, 34, 0.8)
    fail_color = rgba(204, 34, 34, 0.8)
    
    placeholder_text = <span foreground="##ffffff99">Enter Password</span>
    hide_input = false
    
    position = 0, -100
    halign = center
    valign = center
}

# 底部用户提示
label {
    monitor =
    text = 󰌾 $USER
    color = rgba(255, 255, 255, 0.4)
    font_size = 12
    font_family = JetBrains Mono Nerd Font
    position = 0, 30
    halign = center
    valign = bottom
}
